<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Way Made Known | Prisca Dezigns OS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap">
    <style>
        :root { --accent: #FFFFFF; --bg: #000; --surface: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .header { font-weight: 900; font-size: 2.5rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .desc { color: #666; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
        .utility-box { background: var(--surface); border: 1px solid #111; padding: 40px; border-radius: 30px; width: 80%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .status-light { display: inline-block; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--accent); }
        .status-txt { font-weight: 900; font-size: 0.6rem; letter-spacing: 2px; color: #444; }
        .cta { margin-top: 30px; border: 1px solid var(--accent); padding: 12px 30px; color: #fff; text-decoration: none; border-radius: 100px; font-weight: 900; font-size: 0.7rem; transition: 0.3s; }
        .cta:hover { background: var(--accent); color: #000; }

        #leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; overflow: hidden; }
        .leaf { position: absolute; font-size: 24px; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); left: var(--start-x); } 100% { transform: translateY(110vh) rotate(360deg); left: var(--end-x); } }
    </style>
</head>
<body>
    <div id='leaf-container'></div>
    <div class="header">The Way Made Known</div>
    <div class="desc">The Backbone of the Network</div>
    <div class="utility-box">
        <div style="margin-bottom: 20px;">
            <span class="status-light"></span>
            <span class="status-txt">INDEPENDENT NODE ACTIVE</span>
        </div>
        <div style="color: #888; font-size: 0.9rem; line-height: 1.6;">
            The The Way Made Known utility node is now anchored to the Prisca Dezigns Trusted Ledger. High quality services are synchronized.
        </div>
        <div style="margin-top: 40px;">
            <a href="javascript:void(0)" onclick="parent.closeBranch()" class="cta">EXIT NODE</a>
        </div>
    </div>

    <script>
        function createLeaf() {
            const container = document.getElementById('leaf-container');
            if (!container) return;
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            const icons = ['🍃', '🍂', '🌿'];
            leaf.innerText = icons[Math.floor(Math.random() * icons.length)];
            const startX = Math.random() * 100 + '%';
            const endX = (Math.random() * 100 - 10) + '%';
            const duration = Math.random() * 5 + 10;
            leaf.style.setProperty('--start-x', startX);
            leaf.style.setProperty('--end-x', endX);
            leaf.style.animationDuration = duration + 's';
            leaf.style.left = startX;
            container.appendChild(leaf);
            setTimeout(() => leaf.remove(), duration * 1000);
        }
        setInterval(createLeaf, 500);
    </script>
</body>
</html>
