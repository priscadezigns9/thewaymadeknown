<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Neural Proclamation | The Way Made Known</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,700&family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C5A059; --bg: #fff; --text: #1A1A1A; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; }

        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; }
        
        .hero { min-height: 100vh; padding: 180px 8% 100px; text-align: center; max-width: 1000px; margin: 0 auto; }
        .tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); font-weight: 900; margin-bottom: 20px; display: block; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-style: italic; line-height: 1.1; margin-bottom: 60px; font-weight: 400; }

        .interface { background: #fafafa; border: 1px solid var(--border); padding: 60px; border-radius: 2px; }
        .input-group { display: flex; gap: 20px; margin-top: 20px; }
        input { flex: 1; padding: 20px; border: 1px solid var(--border); font-family: inherit; font-size: 1.1rem; }
        .run-btn { padding: 0 40px; background: #000; color: #fff; border: none; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; }

        #ai-result { margin-top: 60px; }
        .report { text-align: left; animation: fadeIn 1s; border-top: 2px solid #000; padding-top: 50px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .verse-box { padding: 40px; background: #fff; border-left: 4px solid var(--accent); margin: 30px 0; font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-style: italic; }
        .analysis-box { padding: 30px; background: #fcfcfc; border: 1px solid var(--border); font-size: 0.95rem; color: #555; }

        footer { padding: 100px 8% 50px; text-align: center; border-top: 1px solid var(--border); opacity: 0.3; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <header>
        <a href="../" class="logo">The Way Made Known</a>
        <nav><a href="../" style="color:#000; text-decoration:none; font-weight:700; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Mission</a></nav>
    </header>

    <main class="hero">
        <span class="tag">Neural Proclamation V1.0</span>
        <h1>Cohesion of Truth.</h1>

        <div class="interface">
            <p style="color:#888; margin-bottom:40px; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">Identify Scripture or Question for Analytical Synthesis</p>
            <div class="input-group">
                <input type="text" id="ai-input" placeholder="e.g. Evidence for the Resurrection, Genesis 1:1, Hope..." autocomplete="off">
                <button class="run-btn" onclick="runAnalysis()">Synthesize</button>
            </div>
            <div id="ai-result"></div>
        </div>
    </main>

    <footer>© 2026 THE WAY MADE KNOWN // ARCHIVAL FAITH INTELLIGENCE</footer>

    <script>
    function runAnalysis() {
        const input = document.getElementById('ai-input').value.trim();
        const res = document.getElementById('ai-result');
        if(!input) return;

        res.innerHTML = '<p style="text-align:center; font-weight:700; letter-spacing:4px; margin-top:40px; color:var(--accent);">SEARCHING SCRIPTURE ARCHIVES...</p>';

        setTimeout(() => {
            const query = input.toLowerCase();
            let verse = "For I am not ashamed of the gospel, for it is the power of God for salvation to everyone who believes.";
            let ref = "Romans 1:16";
            
            if(query.includes('resurrection') || query.includes('evidence')) { verse = "If Christ has not been raised, your faith is futile and you are still in your sins."; ref = "1 Corinthians 15:17"; }
            if(query.includes('hope')) { verse = "Now hope does not disappoint, because the love of God has been poured out in our hearts."; ref = "Romans 5:5"; }

            res.innerHTML = `
                <div class="report">
                    <span class="tag" style="font-size:0.6rem;">Synthesis Complete // Biblical Cohesion Active</span>
                    <h2 style="font-family:'Cormorant Garamond'; font-size:2.5rem; font-style:italic; margin:10px 0 30px;">Analytical Readout</h2>
                    
                    <div class="verse-box">
                        "${verse}" — ${ref}
                    </div>

                    <div class="analysis-box">
                        <strong>NEURAL VERDICT:</strong> Analytical faith confirms the integrity of this proclamation. The cohesion of truth within "${input}" reveals a high-fidelity spiritual signal. Focus on scriptural evidence and historical verification.
                    </div>

                    <a href="https://www.amazon.com/s?k=evidence-based+christianity+books&tag=priscadezigns-20" target="_blank" 
                       style="display:block; margin-top:40px; padding:20px; background:#000; color:#fff; text-align:center; text-decoration:none; font-weight:700; text-transform:uppercase; letter-spacing:3px; font-size:0.8rem;">
                       Acquire Analytical Resources →
                    </a>
                </div>
            `;
        }, 1800);
    }
    </script>
</body>
</html>
